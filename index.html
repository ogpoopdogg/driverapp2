<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="google" content="notranslate">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>E&C Dispatch | Driver Portal</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --accent: #ffcc00; --queue-orange: #ff9800; --active-green: #4caf50;
      --review-blue: #2196f3; --decline-red: #f44336; --update-blue: #00d4ff;
      --bg-core: #050505; --bg-panel: #1e1e1e; --bg-header: #0a0a0a; --bg-input: #222;
      --text-main: #ffffff; --text-sec: #bbb; --border-soft: #333; --card-bg: #1e1e1e;
      --pickup-bg: #ff9800;
      --delivery-bg: #4caf50;
      --update-banner: #ffc107;
      --transfer-bg: #2196f3;
      --dnp-bg: #f44336;
      --new-badge: #2196f3;
      --updated-badge: #ffc107;
      --arrived-bg: #4caf50;
    }
    [data-theme="light"] {
      --accent: #d6a400; --bg-core: #f0f2f5; --bg-panel: #ffffff; --bg-header: #ffffff;
      --bg-input: #eef; --text-main: #111111; --text-sec: #555555; --border-soft: #ccc; --card-bg: #ffffff;
      --pickup-bg: #f57c00;
      --delivery-bg: #388e3c;
      --update-banner: #ffb300;
      --transfer-bg: #1976d2;
      --dnp-bg: #d32f2f;
      --new-badge: #1976d2;
      --updated-badge: #ffb300;
      --arrived-bg: #388e3c;
    }
    [data-theme="light"] #clock, [data-theme="light"] .city-tag, [data-theme="light"] .stop-badge,
    [data-theme="light"] .pickup-value, [data-theme="light"] .drop-value, [data-theme="light"] .mini-address,
    [data-theme="light"] .driver-name-display { color: #000 !important; border-color: #000 !important; text-shadow: none !important; }
    [data-theme="light"] [id^="po-container"] span { color: #000 !important; }

    * { box-sizing: border-box; }
    html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; background: var(--bg-core); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; }
    
    #map-container { height: 0 !important; width: 0 !important; opacity: 0; pointer-events: none; position: absolute; }
    #drag-resizer { display: none !important; }
    #main-container { display: flex; flex-direction: column; flex: 1; width: 100%; height: 100%; overflow: hidden; background: var(--bg-core); position: relative; }
    
    #mini-map-list { position: absolute; inset: 0; width: 100%; background: var(--bg-core); padding: 20px 15px 100px 15px; overflow-y: auto; z-index: 10; border: none; display: block; }

    /* ----- NEW STOP CARD (BUTTON) ----- */
    .stop-card {
      display: flex;
      align-items: center;
      width: 100%;
      min-height: 90px;
      background: var(--card-bg);
      border: 1px solid var(--border-soft);
      border-radius: 12px;
      margin-bottom: 12px;
      padding: 8px 12px 8px 0;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      font-family: inherit;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
    }
    .stop-card:active { transform: scale(0.98); background: var(--bg-input); }
    .stop-card.arrived-card { background: var(--arrived-bg) !important; border: 2px solid white; }
    .stop-card.nearby-card { border: 2px solid var(--active-green); box-shadow: 0 0 15px var(--active-green); animation: gentlePulse 2s infinite; }
    @keyframes gentlePulse { 0% { border-color: var(--active-green); box-shadow: 0 0 5px var(--active-green); } 50% { border-color: #8bc34a; box-shadow: 0 0 20px #8bc34a; } 100% { border-color: var(--active-green); box-shadow: 0 0 5px var(--active-green); } }
    .stop-card.new-card { border: 2px solid var(--new-badge); animation: newPulse 1.5s infinite; }
    @keyframes newPulse { 0% { border-color: var(--new-badge); box-shadow: 0 0 5px var(--new-badge); } 50% { border-color: #90caf9; box-shadow: 0 0 15px var(--new-badge); } 100% { border-color: var(--new-badge); box-shadow: 0 0 5px var(--new-badge); } }
    .stop-card.updated-card { border: 2px solid var(--updated-badge); animation: updatedPulse 1.5s infinite; }
    @keyframes updatedPulse { 0% { border-color: var(--updated-badge); box-shadow: 0 0 5px var(--updated-badge); } 50% { border-color: #ffe082; box-shadow: 0 0 15px var(--updated-badge); } 100% { border-color: var(--updated-badge); box-shadow: 0 0 5px var(--updated-badge); } }

    .stop-left {
      width: 80px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 10px 0 0 10px;
      margin-right: 12px;
      background: var(--pickup-bg);
      color: #000;
      font-weight: 900;
      flex-shrink: 0;
      padding: 8px 0;
    }
    .stop-left.delivery-left { background: var(--delivery-bg); }
    .stop-number { font-size: 32px; line-height: 1; }
    .stop-type { font-size: 12px; text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px; margin-top: 2px; }

    .stop-right {
      flex: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-width: 0;
    }
    .stop-business { font-size: 18px; font-weight: 700; line-height: 1.2; word-wrap: break-word; max-width: 70%; color: var(--text-main); }
    .stop-badge-stack {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      margin-left: 8px;
      flex-shrink: 0;
    }
    .status-badge {
      padding: 4px 8px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .badge-new { background: var(--new-badge); color: white; }
    .badge-updated { background: var(--updated-badge); color: #000; }
    .badge-arrived { background: white; color: #000; border: 2px solid var(--arrived-bg); }
    .count-badge {
      background: var(--accent);
      color: #000;
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 900;
    }

    /* ----- HEADER ENHANCEMENTS ----- */
    #header-stats {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: 8px;
      flex-wrap: wrap;
    }
    .stops-remaining {
      background: var(--bg-panel);
      border: 1px solid var(--accent);
      border-radius: 30px;
      padding: 4px 14px;
      font-weight: 900;
      font-size: 16px;
      white-space: nowrap;
      color: var(--accent);
    }
    .big-run-btn {
      width: 100%;
      height: 60px;
      margin: 0 16px 16px 16px;
      border: none;
      border-radius: 12px;
      font-weight: 900;
      font-size: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.1s, filter 0.2s;
      box-shadow: 0 6px 12px rgba(0,0,0,0.3);
      flex-shrink: 0;
    }
    .big-run-btn:active { transform: scale(0.98); }
    .big-run-btn.start { background: var(--active-green); color: white; }
    .big-run-btn.end { background: var(--review-blue); color: white; }

    /* ----- JOB DETAIL REDESIGN (full screen card) ----- */
    .job-detail-card {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      background: var(--bg-core);
      color: var(--text-main);
      overflow-y: auto;
      padding: 0 0 120px 0; /* space for bottom bar */
      position: relative;
    }
    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--border-soft);
    }
    .stop-counter { font-size: 16px; font-weight: 700; color: var(--text-sec); }
    .back-btn {
      min-width: 60px;
      min-height: 60px;
      background: var(--bg-panel);
      border: 1px solid var(--border-soft);
      border-radius: 8px;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
    }
    .update-banner {
      background: var(--update-banner);
      color: #000;
      font-weight: 900;
      padding: 14px 16px;
      font-size: 18px;
      text-align: center;
      border-bottom: 2px solid #000;
    }
    .info-section {
      padding: 20px 16px;
      border-bottom: 1px solid var(--border-soft);
    }
    .info-section.pickup { background: rgba(255,152,0,0.1); border-left: 8px solid var(--pickup-bg); }
    .info-section.delivery { background: rgba(76,175,80,0.1); border-left: 8px solid var(--delivery-bg); }
    .info-section.gray { background: rgba(128,128,128,0.1); border-left: 8px solid #aaa; }
    .section-label {
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: 0.5px;
      color: var(--text-sec);
      margin-bottom: 8px;
    }
    .business-name-lg { font-size: 24px; font-weight: 700; line-height: 1.2; margin-bottom: 6px; }
    .address-lg { font-size: 18px; font-weight: 400; line-height: 1.3; margin-bottom: 12px; }
    .phone-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 12px 0;
    }
    .call-btn {
      min-width: 80px;
      min-height: 60px;
      background: var(--active-green);
      border: none;
      border-radius: 12px;
      font-weight: 800;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 16px;
      color: white;
      text-transform: uppercase;
    }
    .call-btn:active { transform: scale(0.96); }
    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 12px 0;
      flex-wrap: wrap;
      gap: 10px;
    }
    .package-highlight { font-weight: 900; color: var(--decline-red); font-size: 18px; }
    .edit-icon-btn {
      min-width: 48px;
      min-height: 48px;
      background: var(--bg-panel);
      border: 1px solid var(--border-soft);
      border-radius: 8px;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
    }
    .history-text { font-size: 12px; color: var(--text-sec); margin-top: 16px; font-style: italic; }

    /* Bottom action bar (2x2 grid) */
    .bottom-action-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-header);
      border-top: 2px solid var(--accent);
      padding: 12px 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      z-index: 300;
    }
    .action-btn {
      min-height: 80px;
      border: none;
      border-radius: 16px;
      font-weight: 800;
      font-size: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-transform: uppercase;
      color: white;
      transition: transform 0.1s;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }
    .action-btn:active { transform: scale(0.96); }
    .action-btn.done { background: var(--active-green); }
    .action-btn.dnp { background: var(--dnp-bg); }
    .action-btn.transfer { background: var(--transfer-bg); }
    .action-btn.note { background: var(--update-banner); color: #000; }
    .action-icon { font-size: 28px; line-height: 1; }
    .action-label { font-size: 14px; font-weight: 800; }

    /* Run performance screen */
    .perf-screen {
      padding: 20px 16px 100px;
    }
    .big-total {
      font-size: 64px;
      font-weight: 900;
      color: var(--accent);
      text-align: center;
      line-height: 1;
    }
    .total-label {
      font-size: 16px;
      text-align: center;
      text-transform: uppercase;
      color: var(--text-sec);
      margin-bottom: 30px;
    }
    .completed-item {
      display: flex;
      justify-content: space-between;
      padding: 16px 0;
      border-bottom: 1px solid var(--border-soft);
    }
    .completed-name { font-size: 18px; font-weight: 700; }
    .completed-time { color: var(--text-sec); font-size: 14px; }
    .depot-btn-full {
      width: 100%;
      min-height: 120px;
      background: var(--review-blue);
      border: none;
      border-radius: 24px;
      font-weight: 900;
      font-size: 20px;
      color: white;
      text-transform: uppercase;
      margin: 30px 0 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
    }
    .depot-btn-full:active { transform: scale(0.98); }
    .onboard-badge { background: black; color: white; padding: 6px 16px; border-radius: 40px; font-size: 16px; }

    /* remove old field animations */
    .field-highlight, .info-btn-animate, .update-badge, .list-update-badge, .mini-flash { animation: none !important; background: none !important; box-shadow: none !important; border: none !important; color: inherit !important; text-shadow: none !important; }

    /* preserve existing essential classes but neuter animations */
    .has-update { border: none !important; animation: none !important; }
    .arrival-green-tint { background: transparent !important; animation: none !important; border: none !important; }

    /* hide old elements we replace */
    .mini-list-item { display: none !important; }
    .active-card { display: none !important; } /* we will show new ones */

    /* make sure new cards show */
    #mini-map-list { display: block; }

    /* sortable should not interfere */
    .sortable-ghost, .sortable-drag { display: none !important; }

    /* tablet two column for list */
    @media (min-width: 768px) {
      #mini-map-list { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .stop-card { margin-bottom: 0; }
    }
  </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2>E&C PORTAL</h2>
        <input type="email" id="login-user" class="login-input" placeholder="Email (DriverName@ec.com)" autofocus>
        <input type="password" id="login-pin" class="login-input" placeholder="Password">
        <button class="login-submit" onclick="attemptLogin()">Enter</button>
    </div>
</div>

<header>
  <h1 id="header-name">
    <img src="icon-512.png" class="header-logo" alt="Logo" onclick="toggleTheme()">
    E&C PORTAL
  </h1>
  <div id="header-stats">
    <span class="stops-remaining" id="stops-remaining-display">0 STOPS</span>
    <button id="install-btn" class="install-btn" onclick="installPWA()">Install App</button>
    <button id="shift-toggle-btn" style="display:none; background:var(--active-green); border:none; border-radius:30px; padding:8px 16px; font-weight:900; color:white;" onclick="toggleShift()">START RUN</button>
    <button id="logout-btn" onclick="logoutDriver()" style="cursor:pointer; font-size: 14px; color: #ffffff; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; border: 1px solid #ffffff; padding: 2px 8px; border-radius: 4px; white-space: nowrap; background: transparent;">LOGOUT</button>
  </div>
</header>

<!-- full-width run button (dynamic) -->
<div id="big-run-container" style="padding: 0 16px; display: none;">
  <button id="big-run-btn" class="big-run-btn" onclick="toggleShift()"></button>
</div>

<div id="map-container"><div id="map"></div></div>
<div id="drag-resizer"></div>

<div id="main-container">
  <div id="mini-map-list"></div>
  <div id="live-feed" onclick="if(event.target === this) closeJobCard()"></div>
  <div id="route-btns-wrap">
    <div style="display:flex; flex-direction:column; align-items:center;">
      <button id="route-toggle-btn" onclick="openExternalRoute()">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      </button>
      <span style="font-size:10px; font-weight:800; color:var(--accent); margin-top:5px; text-transform:uppercase;">auto</span>
      <span style="font-size:10px; font-weight:800; color:var(--accent); margin-top:2px; text-transform:uppercase;">Next 10 Stops</span>
    </div>
  </div>
  <div id="history-sidebar" style="display:none;">
    <div id="queue-log"></div>
    <div id="recent-log"></div>
    <button id="multi-route-btn" onclick="routeOptimized()">ROUTE NAV</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA6umETP8wBUEV41ugAtiNiChUeLmmwmZI&libraries=places,geometry&callback=initMap" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

<script>
  const savedTheme = localStorage.getItem('ec_theme') || 'dark';
  document.body.setAttribute('data-theme', savedTheme);
  
  firebase.initializeApp({
    apiKey: "AIzaSyAKmgoXA4m3cRTmxJq4aUyva5SVvFbTNqg",
    authDomain: "eandccourier-36fcc.firebaseapp.com",
    databaseURL: "https://eandccourier-36fcc-default-rtdb.firebaseio.com",
    projectId: "eandccourier-36fcc",
    messagingSenderId: "931221081541",
    appId: "1:1067680083511:android:22d1eb3757302492bd19b2",
  }); 
  firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);

  const db = firebase.database();
  let messaging = null;
  try { if (firebase.messaging.isSupported()) messaging = firebase.messaging(); } catch(e) { console.warn("Msg not supported"); }

  let currentDriver = localStorage.getItem('ec_driver_name');
  let observer = null, fieldSnapshots = {}, pendingAlerts = {}, selfEdited = new Set(), globalJobs = {};
  let assignedJobs = {}, pickedUpJobs = {};  let map, directionsService, directionsRenderer, driverMarker = null, mapMarkers = [], mapLabels = [], mapPolyline = null;
  let isNavigating = false, autoCenter = true, lastGps = null, optimizedOrder = [];
  let lastPendingCount = 0, lastAnnouncedId = null, isFirstLoad = true, hasRoutedWithGps = false, hasInitialRoute = false;
  let lastGpsUpdate = 0, wakeLock = null, lastRouteClick = Date.now();
  let manualOrderIds = []; 
  const gpsInterval = 30000;
  let previouslyKnown = JSON.parse(localStorage.getItem('ec_known_jobs') || '[]');

  const darkMapStyles = [
    { elementType: "geometry", stylers: [{ color: "#242f3e" }] },
    { elementType: "labels.text.stroke", stylers: [{ color: "#242f3e" }] },
    { elementType: "labels.text.fill", stylers: [{ color: "#746855" }] },
    { featureType: "road", elementType: "geometry", stylers: [{ color: "#38414e" }] },
    { featureType: "road", elementType: "geometry.stroke", stylers: [{ color: "#212a37" }] },
    { featureType: "water", elementType: "geometry", stylers: [{ color: "#17263c" }] }
  ];
  
  function toggleTheme() {
    const isLight = document.body.getAttribute('data-theme') === 'light';
    const newTheme = isLight ? 'dark' : 'light';
    document.body.setAttribute('data-theme', newTheme);
    localStorage.setItem('ec_theme', newTheme);
    if(map) map.setOptions({ styles: newTheme === 'light' ? [] : darkMapStyles });
  }
  
  function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
      zoom: 13, center: { lat: 49.8485, lng: -99.9501 }, disableDefaultUI: true, styles: document.body.getAttribute('data-theme') === 'light' ? [] : darkMapStyles
    });
    directionsService = new google.maps.DirectionsService();
    directionsRenderer = new google.maps.DirectionsRenderer({
      map: map, suppressMarkers: true, preserveViewport: true,
      polylineOptions: { strokeColor: "#00d4ff", strokeWeight: 6, strokeOpacity: 0.8 }
    });
    driverMarker = new google.maps.Marker({ map: map, icon: { path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW, scale: 6, fillColor: "#4285F4", fillOpacity: 1, strokeWeight: 2, strokeColor: "white", rotation: 0 }, zIndex: 999 });
    map.addListener('dragstart', () => { autoCenter = false; });
  }

  function enableAutoCenter() {
      autoCenter = true;
      if(lastGps) { map.setCenter({lat: lastGps.lat, lng: lastGps.lng}); map.setZoom(17); map.setTilt(45); }
  }

  window.togglePriority = function(e, idsString) {
      e.stopPropagation();
      const ids = idsString.split(',');
      let updates = {};
      ids.forEach(id => {
          if (globalJobs[id]) {
              globalJobs[id].manual_priority = false;
              updates[`${id}/manual_priority`] = false;
          }
      });
      if(Object.keys(updates).length > 0) {
          db.ref('jobs').update(updates);
      }
  };

  async function openExternalRoute() {
    hasInitialRoute = true;
    document.getElementById('route-toggle-btn').classList.remove('route-glow-update');
    document.querySelectorAll('.mini-flash').forEach(el => el.classList.remove('mini-flash')); 
    if(optimizedOrder.length === 0) { alert("No stops to route."); return; }
    
    const origin = lastGps ? `${lastGps.lat},${lastGps.lng}` : "1604 Moreland Ave, Brandon MB";
    const destination = "1604 Moreland Ave, Brandon MB";
    const seenLocs = new Set();
    const waypoints = optimizedOrder.map(id => {
        const job = globalJobs[id];
        if(!job) return "";
        const addr = job.status === 'pending_pickup' ? job.pickup_location : job.destination;
        const name = job.status === 'pending_pickup' ? job.name : job.delivery_name;
        const city = job.status === 'pending_pickup' ? (job.pickup_city || job.city || "Brandon") : (job.delivery_city || job.city || "Brandon");
        const isCoords = addr ? /^-?\d+(\.\d+)?,\s*-?\d+(\.\d+)?$/.test(addr.trim()) : false;
        const key = isCoords ? addr.replace(/\s+/g, '') : `${name} ${addr}, ${city}`;
        if(seenLocs.has(key)) return "";
        seenLocs.add(key);
        return encodeURIComponent(key);
    }).filter(w => w !== "").join("|");

    lastRouteClick = Date.now();
    const userAgent = navigator.userAgent || navigator.vendor || window.opera;
    if (/android/i.test(userAgent)) {
        window.location.href = `intent://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}&waypoints=${waypoints}&travelmode=driving#Intent;scheme=https;package=com.google.android.apps.maps;end`;
    } else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
        window.location.href = `comgooglemaps://?saddr=${encodeURIComponent(origin)}&daddr=${encodeURIComponent(destination)}&waypoints=${waypoints}&directionsmode=driving`;
    } else {
        window.open(`https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}&waypoints=${waypoints}&travelmode=driving`, '_blank');
    }
  }

  function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371000, dLat = (lat2 - lat1) * Math.PI / 180, dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

    if(!currentDriver || !lastGps) return;

    if(now - lastGpsUpdate < 2000) return; 
    db.ref(`driver_locations/${currentDriver}`).update({ lat: lastGps.lat, lng: lastGps.lng, last_seen: now, gps_timestamp: now });
    lastGpsUpdate = now;
  }
  setInterval(broadcastLocation, gpsInterval);

  document.addEventListener('touchstart', broadcastLocation, {passive: true});

  async function startContinuousTracking() {
    if ("Notification" in window && "serviceWorker" in navigator && messaging) {
      Notification.requestPermission().then(perm => {
        if (perm === 'granted') navigator.serviceWorker.ready.then(reg => messaging.getToken({ serviceWorkerRegistration: reg, vapidKey: "BA1S09dDHyCTLXZfDGckfFdg0kvCyezfgst5eMhe0TnL03C7eHn3yogeC_u20knFpMxFNsHGZHsDjNp0RXjKHfI" }).then(token => { if (token && currentDriver) db.ref(`driver_locations/${currentDriver}/fcm_token`).set(token); }));
      });
    }
    if ('wakeLock' in navigator) try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
    if (!navigator.geolocation) return;
    navigator.geolocation.watchPosition((pos) => {
      lastGps = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      const latLng = new google.maps.LatLng(lastGps.lat, lastGps.lng);
      Object.keys(globalJobs).forEach(jid => {
        const job = globalJobs[jid];
        if (job.status === 'pending' && job.lat && job.lng && job.assigned_to === currentDriver) {
          if (getDistance(pos.coords.latitude, pos.coords.longitude, job.lat, job.lng) < 50) {
            document.getElementById('card-' + jid)?.classList.add('arrival-highlight');
            const mini = document.querySelector(`[id^="mini-"][id*="${jid}"]`);
            if(mini) mini.classList.add('arrival-green-tint');
          }
        }
      });
      if(driverMarker) {
        driverMarker.setPosition(latLng);
        if(pos.coords.heading) { const icon = driverMarker.getIcon(); icon.rotation = pos.coords.heading; driverMarker.setIcon(icon); }
      }
      if(autoCenter && map) { map.setCenter(latLng); map.setHeading(pos.coords.heading || 0); }
      if (!hasRoutedWithGps && Object.keys(globalJobs).length > 0) { hasRoutedWithGps = true; updateRoute(); }
      if (lastGpsUpdate === 0) broadcastLocation();

      // proximity detection for new cards
      if (window.updateProximityClasses) window.updateProximityClasses();
    }, (err) => console.warn("GPS Error:", err.message), { enableHighAccuracy: true, maximumAge: 0 });
  }

  async function updateRoute() {
    let jobs = Object.values(globalJobs).filter(j => (j.status === 'pending_pickup' || j.status === 'pending_delivery') && j.assigned_to === currentDriver);
    if(mapPolyline) mapPolyline.setMap(null);
    if (mapMarkers.length > 0) { mapMarkers.forEach(m => m.setMap(null)); mapMarkers = []; }
    mapLabels.forEach(l => l.close()); mapLabels = [];
    optimizedOrder = []; 
    if(jobs.length === 0) return;

    const groups = [], groupMap = new Map();
    jobs.forEach(j => {
        try {
            const addr = j.status === 'pending_pickup' ? j.pickup_location : j.destination;
            const name = j.status === 'pending_pickup' ? j.name : j.delivery_name;
            const city = j.status === 'pending_pickup' ? (j.pickup_city || job.city || "Brandon") : (j.delivery_city || job.city || "Brandon");
            const isCoords = addr ? /^-?\d+(\.\d+)?,\s*-?\d+(\.\d+)?$/.test(addr.trim()) : false;
            const key = isCoords ? addr.replace(/\s+/g, '') : `${name}|${addr}|${city}`.toLowerCase();
            const displayStr = isCoords ? addr.trim() : `${name} ${addr}, ${city}`;
            if(!groupMap.has(key)) {
                const group = { key: key, masterJob: j, jobs: [], addrString: displayStr, isCoords: isCoords };
                groupMap.set(key, group); groups.push(group);
            }
            groupMap.get(key).jobs.push(j);
        } catch (e) {
            console.warn("Skipped coordinate card error:", e);
        }
    });

    let priorityGroups = [];
    let normalGroups = [];

    groups.forEach(g => {
        const isPriority = g.jobs.some(j => j.manual_priority);
        if (isPriority) priorityGroups.push(g);
        else normalGroups.push(g);
    });

    priorityGroups.sort((a, b) => {
        const aId = Object.keys(globalJobs).find(k => globalJobs[k] === a.jobs[0]);
        const bId = Object.keys(globalJobs).find(k => globalJobs[k] === b.jobs[0]);
        let idxA = manualOrderIds.indexOf(aId);
        let idxB = manualOrderIds.indexOf(bId);
        if(idxA === -1) idxA = 999;
        if(idxB === -1) idxB = 999;
        return idxA - idxB;
    });

    let orderedNormalGroups = normalGroups;
    if (normalGroups.length > 1) {
        let routeOrigin = lastGps ? { location: { latLng: { latitude: lastGps.lat, longitude: lastGps.lng } } } : { address: "1604 Moreland Ave, Brandon MB" };
        if (priorityGroups.length > 0) {
            const lastPrio = priorityGroups[priorityGroups.length - 1];
            routeOrigin = lastPrio.isCoords ? { location: { latLng: { latitude: parseFloat(lastPrio.addrString.split(',')[0]), longitude: parseFloat(lastPrio.addrString.split(',')[1]) } } } : { address: lastPrio.addrString };
        }
        try {
            const optRes = await fetch("https://routes.googleapis.com/directions/v2:computeRoutes", {
                method: "POST",
                headers: { "Content-Type": "application/json", "X-Goog-Api-Key": "AIzaSyA6umETP8wBUEV41ugAtiNiChUeLmmwmZI", "X-Goog-FieldMask": "routes.optimizedIntermediateWaypointIndex" },
                body: JSON.stringify({
                    origin: routeOrigin,
                    destination: { address: "1604 Moreland Ave, Brandon MB" },
                    intermediates: normalGroups.map(g => g.isCoords ? { location: { latLng: { latitude: parseFloat(g.addrString.split(',')[0]), longitude: parseFloat(g.addrString.split(',')[1]) } } } : { address: g.addrString }),
                    travelMode: "DRIVE", optimizeWaypointOrder: true
                })
            });
            const optData = await optRes.json();
            if (optData.routes && optData.routes[0] && optData.routes[0].optimizedIntermediateWaypointIndex) {
                orderedNormalGroups = optData.routes[0].optimizedIntermediateWaypointIndex.map(idx => normalGroups[idx]);
            }
        } catch(e) { console.warn("Optimization of rest failed:", e); }
    }

    const finalGroups = priorityGroups.concat(orderedNormalGroups);

    try {
        const response = await fetch("https://routes.googleapis.com/directions/v2:computeRoutes", {
            method: "POST",
            headers: { "Content-Type": "application/json", "X-Goog-Api-Key": "AIzaSyA6umETP8wBUEV41ugAtiNiChUeLmmwmZI", "X-Goog-FieldMask": "routes.duration,routes.optimizedIntermediateWaypointIndex,routes.polyline.encodedPolyline,routes.legs" },
            body: JSON.stringify({
                origin: lastGps ? { location: { latLng: { latitude: lastGps.lat, longitude: lastGps.lng } } } : { address: "1604 Moreland Ave, Brandon MB" },
                destination: { address: "1604 Moreland Ave, Brandon MB" }, 
                intermediates: finalGroups.map(g => g.isCoords ? { location: { latLng: { latitude: parseFloat(g.addrString.split(',')[0]), longitude: parseFloat(g.addrString.split(',')[1]) } } } : { address: g.addrString }),
                travelMode: "DRIVE", optimizeWaypointOrder: false
            })
        });
        const result = await response.json();
        
        if (result.routes && result.routes[0]) {
            if(result.routes[0].polyline) {
                const path = google.maps.geometry.encoding.decodePath(result.routes[0].polyline.encodedPolyline);
                mapPolyline = new google.maps.Polyline({ path: path, geodesic: true, strokeColor: "#00d4ff", strokeOpacity: 0.8, strokeWeight: 6, map: map });
            }
            const order = result.routes[0].optimizedIntermediateWaypointIndex;
            let orderedGroups = finalGroups;
            if(order && order.length > 0) orderedGroups = order.map(idx => finalGroups[idx]);
            
            optimizedOrder = [];
            orderedGroups.forEach(g => g.jobs.forEach(j => { const jId = Object.keys(globalJobs).find(k => globalJobs[k] === j); if(jId) optimizedOrder.push(jId); }));

            if(result.routes[0].polyline) {
                 let dur = result.routes[0].duration ? parseInt(result.routes[0].duration) : 0;
                 let durStr = dur > 3600 ? `${Math.floor(dur/3600)} hr ${Math.floor((dur%3600)/60)} min` : `${Math.floor(dur/60)} min`;
                 db.ref(`driver_locations/${currentDriver}`).update({ active_route: result.routes[0].polyline.encodedPolyline, route_string: orderedGroups.map((g, i) => `${i+1}. ${g.masterJob.status==='pending_pickup' ? (g.masterJob.name + ' ' + g.masterJob.pickup_location) : (g.masterJob.delivery_name + ' ' + g.masterJob.destination)}`).join(" | "), route_order: optimizedOrder, total_duration: durStr, route_timestamp: Date.now() });
            }

            // we don't use the old list anymore, we render via renderUnifiedFeed
            renderUnifiedFeed();
            if(Object.keys(globalJobs).length > 0) localStorage.setItem('ec_known_jobs', JSON.stringify(Object.keys(globalJobs)));
        }
    } catch(e) { console.error("Routing Error", e); }
  }

  function setupIntersectionObserver() {
    observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => { 
        if (entry.isIntersecting) { 
            const el = entry.target;
            if(el.classList.contains('stop-card')) {
                setTimeout(() => {
                    // mark as seen logic can go here, but we simplify
                }, 3000);
                observer.unobserve(el);
            }
        } 
      });
    }, { threshold: 0.5 });
  }

  function getNavUrl(name, loc, city) { 
      const isCoords = loc ? /^-?\d+(\.\d+)?,\s*-?\d+(\.\d+)?$/.test(loc.trim()) : false; 
      if(isCoords) return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(loc.trim())}&travelmode=driving`; 
      return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent((name ? name + ' ' : '') + loc + ', ' + city)}&travelmode=driving`; 
  }

  function routeOptimized() { enableAutoCenter(); }
  
  function showJobDetails(id) {
      const job = globalJobs[id];
      if (!job) return;

      // build the new full-screen detail card
      let html = `
        <div class="job-detail-card" id="detail-${id}">
          <div class="detail-header">
            <span class="stop-counter">STOP ${(optimizedOrder.indexOf(id)+1) || '?'} of ${optimizedOrder.length}</span>
            <button class="back-btn" onclick="closeJobCard()">← BACK</button>
          </div>`;
      
      if (pendingAlerts[id] && pendingAlerts[id].length > 0) {
          html += `<div class="update-banner">⚠️ ORDER UPDATED - Please review</div>`;
      }

      // Pickup
      html += `
        <div class="info-section pickup">
          <div class="section-label">PICKUP FROM</div>
          <div class="business-name-lg">${job.name || 'CUSTOMER'}</div>
          <div class="address-lg">${job.pickup_location || 'N/A'}</div>`;
      const pickupPhone = job.p_phone || job.phone || job.phone_number || job.customer_phone;
      if (pickupPhone) {
          html += `<div class="phone-row"><span>${pickupPhone}</span><button class="call-btn" onclick="window.location.href='tel:${pickupPhone}'">📞 CALL</button></div>`;
      } else {
          html += `<div class="phone-row"><span style="color:var(--text-sec);">No phone</span><button class="call-btn" disabled style="opacity:0.5;">CALL</button></div>`;
      }
      html += `</div>`;

      // Delivery
      html += `
        <div class="info-section delivery">
          <div class="section-label">DELIVER TO</div>
          <div class="business-name-lg">${job.delivery_name || 'CUSTOMER'}</div>
          <div class="address-lg">${job.destination || 'N/A'}</div>`;
      const deliveryPhone = job.d_phone || job.phone || job.phone_number || job.customer_phone;
      if (deliveryPhone) {
          html += `<div class="phone-row"><span>${deliveryPhone}</span><button class="call-btn" onclick="window.location.href='tel:${deliveryPhone}'">📞 CALL</button></div>`;
      } else {
          html += `<div class="phone-row"><span style="color:var(--text-sec);">No phone</span><button class="call-btn" disabled style="opacity:0.5;">CALL</button></div>`;
      }
      html += `</div>`;

      // Order details
      html += `
        <div class="info-section gray">
          <div class="section-label">ORDER DETAILS</div>
          <div class="detail-row">
            <span class="package-highlight">${(job.package_details || '-').replace(/skid|pallet/gi, match => `<span style="color:var(--decline-red); font-weight:900;">${match}</span>`)}</span>
          </div>
          <div class="detail-row">
            <span>PO: <strong>${job.po_number || '—'}</strong></span>
            <button class="edit-icon-btn" onclick="enterPoEdit(event, '${id}', '${(job.po_number||'').replace(/'/g, "\\'")}')">EDIT</button>
          </div>
          <div class="detail-row">
            <span style="flex:1;">Notes: <em>${job.other_info || '—'}</em></span>
            <button class="edit-icon-btn" onclick="toggleDriverNoteEdit(event, '${id}')">EDIT</button>
          </div>
          ${job.job_history ? `<div class="history-text">${job.job_history}</div>` : ''}
        </div>
        <div id="driver-note-display-${id}"></div>
        <div class="bottom-action-bar">
          <button class="action-btn done" onclick="markAction('${id}')"><span class="action-icon">✓</span><span class="action-label">DONE</span></button>
          <button class="action-btn dnp" onclick="dndJob('${id}')"><span class="action-icon">⚠</span><span class="action-label">${job.status==='pending_pickup'?'DNP':'DND'}</span></button>
          <button class="action-btn transfer" onclick="toggleDriverTransfer(event, '${id}')"><span class="action-icon">↔</span><span class="action-label">TRANSFER</span></button>
          <button class="action-btn note" onclick="toggleDriverNoteEdit(event, '${id}')"><span class="action-icon">✎</span><span class="action-label">NOTE</span></button>
        </div>
        </div>`;

      document.getElementById('live-feed').innerHTML = html;
      document.getElementById('live-feed').classList.add('overlay-active');
  }
  
  function closeJobCard() {
      document.getElementById('live-feed').classList.remove('overlay-active');
      document.getElementById('live-feed').innerHTML = '<button onclick="closeJobCard()" style="position:absolute; top:15px; left:15px; background:var(--bg-panel); color:var(--accent); border:1px solid var(--border-soft); padding:8px 12px; border-radius:6px; font-weight:800; cursor:pointer; z-index:2001; font-size:12px; box-shadow:0 4px 10px rgba(0,0,0,0.5);">&larr; BACK</button><div style="width:100%; text-align:center; color:#555; font-size:10px; padding:10px; opacity:0.7; letter-spacing:1px;">>>> SWIPE RIGHT TO GO BACK</div>';
  }

 function startDataListeners() {
    db.ref(`driver_locations/${currentDriver}/manual_order`).on('value', snap => { 
        if(snap.exists()) manualOrderIds = snap.val() || []; 
    });
    
    // Listener for jobs currently assigned to this driver
    db.ref("jobs").orderByChild("assigned_to").equalTo(currentDriver).on("value", snap => { 
        assignedJobs = snap.val() || {}; 
        mergeAndRender(); 
    });
    
    // Listener for jobs that were ever picked up by this driver
    db.ref("jobs").orderByChild("picked_up_by").equalTo(currentDriver).on("value", snap => { 
        pickedUpJobs = snap.val() || {}; 
        mergeAndRender(); 
    });
}
  let jobsData = {};

 function mergeAndRender() {
    if(!currentDriver) return;
    const prevTop = optimizedOrder[0];
    
    // Merge assigned jobs and picked-up jobs (jobs that appear in both are deduplicated)
    globalJobs = { ...assignedJobs, ...pickedUpJobs };
    
    const currentPending = Object.values(globalJobs).filter(j => (j.status === 'pending_pickup' || j.status === 'pending_delivery') && j.assigned_to === currentDriver).length;
    // ... rest of the function remains exactly the same
    if (currentPending !== lastPendingCount) {
         if (currentPending > lastPendingCount) {
              lastAnnouncedId = null;
         }
         if (!isFirstLoad) document.getElementById('route-toggle-btn').classList.add('route-glow-update');
    }
    isFirstLoad = false; lastPendingCount = currentPending;
    
    const shiftBtn = document.getElementById('shift-toggle-btn');
    if (shiftBtn) {
        shiftBtn.style.display = (!window.isShiftActive && currentPending > 0) ? 'inline-block' : 'none';
        shiftBtn.innerText = 'START RUN';
        shiftBtn.style.background = 'var(--active-green)';
    }

    renderUnifiedFeed(); updateRoute();
  }

  // proximity helper
  window.updateProximityClasses = function() {
      if (!lastGps) return;
      document.querySelectorAll('.stop-card').forEach(card => {
          const id = card.dataset.jobId;
          if (!id) return;
          const job = globalJobs[id];
          if (!job || !job.lat || !job.lng) return;
          const dist = getDistance(lastGps.lat, lastGps.lng, job.lat, job.lng);
          card.classList.remove('nearby-card', 'arrived-card');
          if (dist < 50) {
              card.classList.add('arrived-card');
          } else if (dist < 100) {
              card.classList.add('nearby-card');
          }
      });
  };

  function renderUnifiedFeed() {
    const feed = document.getElementById("live-feed");
    const miniList = document.getElementById("mini-map-list");
    const stopCounterSpan = document.getElementById("stops-remaining-display");
    
    // build new stop cards
    let pendingJobs = Object.values(globalJobs).filter(j => (j.status === 'pending_pickup' || j.status === 'pending_delivery') && j.assigned_to === currentDriver);
    const pendingCount = pendingJobs.length;
    stopCounterSpan.innerText = pendingCount + ' STOPS';

    // sort by optimizedOrder if available
    if (optimizedOrder.length > 0) {
        pendingJobs = optimizedOrder.map(id => globalJobs[id]).filter(j => j && (j.status === 'pending_pickup' || j.status === 'pending_delivery'));
    } else {
        pendingJobs.sort((a,b) => (a.timestamp||0) - (b.timestamp||0));
    }

    let listHtml = '';
    pendingJobs.forEach((job, idx) => {
        if (!job) return;
        const isPickup = job.status === 'pending_pickup';
        const typeColor = isPickup ? 'var(--pickup-bg)' : 'var(--delivery-bg)';
        const typeText = isPickup ? 'PICKUP' : 'DELIVERY';
        const businessName = isPickup ? (job.name || 'CUSTOMER') : (job.delivery_name || 'CUSTOMER');
        const jobId = Object.keys(globalJobs).find(k => globalJobs[k] === job);
        
        // status badges
        let badgeHtml = '';
        const isNew = !previouslyKnown.includes(jobId);
        const hasUpdate = pendingAlerts[jobId] && pendingAlerts[jobId].length > 0;
        const isArrived = false; // will be set by proximity later
        if (isNew) {
            badgeHtml += '<span class="status-badge badge-new">NEW</span>';
        } else if (hasUpdate) {
            badgeHtml += '<span class="status-badge badge-updated">UPDATED</span>';
        }
        // count badge if multiple jobs at same loc
        const groupCount = 1; // simplified

        listHtml += `
          <div class="stop-card ${isNew ? 'new-card' : ''} ${hasUpdate ? 'updated-card' : ''}" data-job-id="${jobId}" onclick="showJobDetails('${jobId}')">
            <div class="stop-left ${!isPickup ? 'delivery-left' : ''}">
              <span class="stop-number">${idx+1}</span>
              <span class="stop-type">${typeText}</span>
            </div>
            <div class="stop-right">
              <span class="stop-business">${businessName}${groupCount>1 ? ` <span class="count-badge">+${groupCount-1}</span>` : ''}</span>
              <div class="stop-badge-stack">
                ${badgeHtml}
              </div>
            </div>
          </div>`;
    });

    if (pendingCount === 0) {
        // performance screen
        const completed = Object.values(globalJobs).filter(j => 
            (j.assigned_to === currentDriver && (j.completed_at || 0) > new Date().setHours(0,0,0,0)) ||
            (j.picked_up_by === currentDriver && (j.picked_up_at || 0) > new Date().setHours(0,0,0,0))
        );
        const transitCount = Object.values(globalJobs).filter(j => j.status === 'in_transit' && j.assigned_to === currentDriver).length;

        let perfHtml = `<div class="perf-screen">`;
        perfHtml += `<div class="big-total">${completed.length}</div>`;
        perfHtml += `<div class="total-label">STOPS COMPLETED TODAY</div>`;

        completed.slice(0,20).forEach(j => {
            const name = (j.status === 'in_transit' || (j.picked_up_by && !j.completed_at)) ? (j.name || '') : (j.delivery_name || '');
            const time = formatTime12(j.completed_at || j.picked_up_at || j.timestamp);
            perfHtml += `<div class="completed-item"><span class="completed-name">${name}</span><span class="completed-time">${time}</span></div>`;
        });

        perfHtml += `<button class="depot-btn-full" onclick="unloadAtDepot()">`;
        perfHtml += `END SHIFT & CHECK IN AT DEPOT`;
        if (transitCount > 0) perfHtml += `<span class="onboard-badge">(${transitCount} PICKUPS ON BOARD)</span>`;
        perfHtml += `</button>`;
        perfHtml += `</div>`;
        listHtml = perfHtml;
    }

    miniList.innerHTML = listHtml;
    updateProximityClasses();

    // big run button logic
    const bigRunContainer = document.getElementById('big-run-container');
    const bigRunBtn = document.getElementById('big-run-btn');
    if (!window.isShiftActive && pendingCount > 0) {
        bigRunContainer.style.display = 'block';
        bigRunBtn.className = 'big-run-btn start';
        bigRunBtn.innerText = 'START RUN';
    } else if (window.isShiftActive) {
        bigRunContainer.style.display = 'block';
        bigRunBtn.className = 'big-run-btn end';
        bigRunBtn.innerText = 'END SHIFT';
    } else {
        bigRunContainer.style.display = 'none';
    }
  }

  function markAction(id) {
    if (!window.isShiftActive) { alert("Please click START RUN before completing your first job."); return; }
    const job = globalJobs[id]; if(!job) return;
  if (job.status === 'pending_pickup') {
     if(!confirm("Confirm Picked Up?")) return;
     document.getElementById(`detail-${id}`)?.classList.add('card-exit-success');
     closeJobCard();
     setTimeout(() => db.ref('jobs').child(id).update({ 
         status: 'in_transit',
         picked_up_by: currentDriver,
         picked_up_at: Date.now(),
         job_history: (job.job_history || '') + " | Picked up by " + currentDriver
     }), 500);

    } else if (job.status === 'pending_delivery') {
         if(!confirm("Complete Delivery?")) return;
         document.getElementById(`detail-${id}`)?.classList.add('card-exit-success');
         closeJobCard();
         setTimeout(() => {
            sessionStorage.setItem('last_completed_job', id);
            db.ref('jobs').child(id).update({ status: 'completed', completed_at: Date.now(), job_history: (job.job_history || '') + " | Delivered by " + currentDriver });
         }, 500);
    }
  }

  function logoutDriver() { if(confirm("Are you sure you want to log out?")) { firebase.auth().signOut().then(() => { localStorage.removeItem('ec_driver_name'); location.reload(); }); } }

  document.addEventListener('click', e => { 
      if(e.target.id && e.target.id.startsWith('note-display-')) { 
          e.stopPropagation(); const id = e.target.id.split('-').pop(), job = globalJobs[id];
          if(job) db.ref('jobs').child(id).child("other_info").once('value', s => enterNoteEdit(id, (s.val() || "").replace(/\\/g, "\\\\").replace(/'/g, "\\'"))); 
      } 
  });

  let deferredPrompt; const installBtn = document.getElementById('install-btn');
  window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; installBtn.style.display = 'block'; });
  async function installPWA() {
    if (deferredPrompt) { deferredPrompt.prompt(); const { outcome } = await deferredPrompt.userChoice; if (outcome === 'accepted') installBtn.style.display = 'none'; deferredPrompt = null; }
  }
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(console.log));
    navigator.serviceWorker.addEventListener('message', event => { if (event.data && event.data.jobId) showJobDetails(event.data.jobId); });
  }
  
  let touchStart = 0;
  const feedUi = document.getElementById('live-feed');
  feedUi.addEventListener('touchstart', e => touchStart = e.changedTouches[0].screenX, {passive: true});
  feedUi.addEventListener('touchend', e => { if(e.changedTouches[0].screenX > touchStart + 75) closeJobCard(); }, {passive: true});

  function unloadAtDepot() {
      if(!confirm("Are you sure you want to End Shift and Check-In at Depot?")) return;
      window.isShiftActive = false;
      const updates = {}; let count = 0;
      Object.keys(globalJobs).forEach(key => {
          const job = globalJobs[key];
          if (job.status === 'in_transit' && job.assigned_to === currentDriver) {
              count++;
              updates[`jobs/${key}/status`] = 'pending_delivery';
              updates[`jobs/${key}/assigned_to`] = 'Unassigned';
              updates[`jobs/${key}/job_history`] = (job.job_history || '') + ` | Arrived at Depot (Pick-Up by ${currentDriver})`;
          }
      });
      updates[`driver_locations/${currentDriver}/shift_active`] = false;
      db.ref().update(updates).then(() => { alert(count > 0 ? "Inventory Unloaded and Run Ended." : "Run Ended."); mergeAndRender(); }).catch(e => alert("Error unloading: " + e.message));
  }

  function toggleShift() {
    if(!currentDriver) return;
    const newState = !window.isShiftActive;
    db.ref(`driver_locations/${currentDriver}`).update({ shift_active: newState });
    updateRoute();
  }
</script>

    </div>

<script>
  let devQuill;

  // Initialize the editor immediately
  devQuill = new Quill('#dev-editor', {
    theme: 'snow',
    modules: { 
      toolbar: [ 
        ['bold', 'italic', 'underline'], 
        [{ 'list': 'ordered'}, { 'list': 'bullet' }], 
        [{ 'align': [] }] 
      ] 
    }
  });

  function saveDevNote() {
    // Only save if there is text and a user is logged in
    const currentUser = firebase.auth().currentUser;
    if (devQuill.getText().trim() === "" || !currentUser) return;
    
    // Get username from email
    const user = currentUser.email.split('@')[0];
    
    // Format date and time
    const now = new Date();
    const dateStr = now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

    // Push data to Firebase
    firebase.database().ref('developer').push({
      text: devQuill.root.innerHTML,
      user: user,
      date: dateStr,
      timestamp: firebase.database.ServerValue.TIMESTAMP,
      app: "Driver APP"
    }).then(() => {
      devQuill.setText(''); // Clear editor on success
    }).catch(err => {
      console.error("Save failed:", err);
      alert("Permission denied: You must be logged in to save.");
    });
  }
</script>
