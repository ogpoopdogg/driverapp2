    driverMarker = new google.maps.Marker({ map: map, icon: { path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW, scale: 6, fillColor: "#3b82f6", fillOpacity: 1, strokeWeight: 2, strokeColor: "white", rotation: 0 }, zIndex: 999 });
    map.addListener('dragstart', () => { autoCenter = false; });
  }

  async function openExternalRoute() {
    hasInitialRoute = true;
    document.getElementById('route-toggle-btn').classList.remove('route-glow-update');
    document.querySelectorAll('.mini-flash').forEach(el => el.classList.remove('mini-flash')); 
    if(optimizedOrder.length === 0) { alert("No stops to route."); return; }
    
    const origin = lastGps ? `${lastGps.lat},${lastGps.lng}` : "1604 Moreland Ave, Brandon MB";
    const destination = "1604 Moreland Ave, Brandon MB";
    const seenLocs = new Set();
    const waypoints = optimizedOrder.map(id => {
        const job = globalJobs[id];
        if(!job) return "";
        const addr = job.status === 'pending_pickup' ? job.pickup_location : job.destination;
        const name = job.status === 'pending_pickup' ? job.name : job.delivery_name;
        const city = job.status === 'pending_pickup' ? (job.pickup_city || job.city || "Brandon") : (job.delivery_city || job.city || "Brandon");
        const isCoords = addr ? /^-?\d+(\.\d+)?,\s*-?\d+(\.\d+)?$/.test(addr.trim()) : false;
        const key = isCoords ? addr.replace(/\s+/g, '') : `${name} ${addr}, ${city}`;
        if(seenLocs.has(key)) return "";
        seenLocs.add(key);
        return encodeURIComponent(key);
    }).filter(w => w !== "").join("|");

    lastRouteClick = Date.now();
    const userAgent = navigator.userAgent || navigator.vendor || window.opera;
    if (/android/i.test(userAgent)) {
        window.location.href = `intent://googleusercontent.com/maps.google.com/0{encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}&waypoints=${waypoints}&travelmode=driving#Intent;scheme=https;package=com.google.android.apps.maps;end`;
    } else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
        window.location.href = `comgooglemaps://?saddr=${encodeURIComponent(origin)}&daddr=${encodeURIComponent(destination)}&waypoints=${waypoints}&directionsmode=driving`;
    } else {
        window.open(`//googleusercontent.com/maps.google.com/1{encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}&waypoints=${waypoints}&travelmode=driving`, '_blank');
    }
  }

  function activateNewRoute() { document.getElementById('new-route-alert').style.display = 'none'; openExternalRoute(); }

  function getDistance(a, b, c, d) {
    let e = 6371000, f = (c - a) * Math.PI / 180, g = (d - b) * Math.PI / 180, h = Math.sin(f / 2) * Math.sin(f / 2) + Math.cos(a * Math.PI / 180) * Math.cos(c * Math.PI / 180) * Math.sin(g / 2) * Math.sin(g / 2);
    return e * 2 * Math.atan2(Math.sqrt(h), Math.sqrt(1 - h));
  }
  
  function broadcastLocation() {
    if(!currentDriver || !lastGps) return;
    const now = Date.now();
    if(now - lastGpsUpdate < 2000) return; 
    db.ref(`driver_locations/${currentDriver}`).update({ lat: lastGps.lat, lng: lastGps.lng, last_seen: now, gps_timestamp: now });
    lastGpsUpdate = now;
  }
  setInterval(broadcastLocation, gpsInterval);
  document.addEventListener('click', broadcastLocation);
  document.addEventListener('touchstart', broadcastLocation, {passive: true});

  async function startContinuousTracking() {
    if ("Notification" in window && "serviceWorker" in navigator && messaging) {
      Notification.requestPermission().then(perm => {
        if (perm === 'granted') navigator.serviceWorker.ready.then(reg => messaging.getToken({ serviceWorkerRegistration: reg, vapidKey: "BA1S09dDHyCTLXZfDGckfFdg0kvCyezfgst5eMhe0TnL03C7eHn3yogeC_u20knFpMxFNsHGZHsDjNp0RXjKHfI" }).then(token => { if (token && currentDriver) db.ref(`driver_locations/${currentDriver}/fcm_token`).set(token); }));
      });
    }
    if ('wakeLock' in navigator) try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
    if (!navigator.geolocation) return;
    navigator.geolocation.watchPosition(pos => {
      with(pos.coords) {
        lastGps = { lat: latitude, lng: longitude };
        const latLng = new google.maps.LatLng(latitude, longitude);
        Object.keys(globalJobs).forEach(jid => {
          const job = globalJobs[jid];
          if (job.status === 'pending' && job.lat && job.lng && job.assigned_to === currentDriver) {
            if (getDistance(latitude, longitude, job.lat, job.lng) < 50) {
              document.getElementById('card-' + jid)?.classList.add('arrival-highlight');
              const mini = document.querySelector(`[id^="mini-"][id*="${jid}"]`);
              if(mini) mini.classList.add('arrival-green-tint');
            }
          }
        });
        if(driverMarker) {
          driverMarker.setPosition(latLng);
          if(heading) { const icon = driverMarker.getIcon(); icon.rotation = heading; driverMarker.setIcon(icon); }
        }
        if(autoCenter && map) { map.setCenter(latLng); map.setHeading(heading || 0); }
      }
      if (!hasRoutedWithGps && Object.keys(globalJobs).length > 0) { hasRoutedWithGps = true; updateRoute(); }
      if (lastGpsUpdate === 0) broadcastLocation();
    }, err => {}, { enableHighAccuracy: true, maximumAge: 0 });
  }

  async function updateRoute() {
    let jobs = Object.values(globalJobs).filter(j => (j.status === 'pending_pickup' || j.status === 'pending_delivery') && j.assigned_to === currentDriver);
    if(mapPolyline) mapPolyline.setMap(null);
    if (mapMarkers.length > 0) { mapMarkers.forEach(m => m.setMap(null)); mapMarkers = []; }
    mapLabels.forEach(l => l.close()); mapLabels = [];
    optimizedOrder = []; 
    if(jobs.length === 0) return;

    const groups = [], groupMap = new Map();
    jobs.forEach(j => {
        try {
            const addr = j.status === 'pending_pickup' ? j.pickup_location : j.destination;
            const name = j.status === 'pending_pickup' ? j.name : j.delivery_name;
            const city = j.status === 'pending_pickup' ? (j.pickup_city || job.city || "Brandon") : (j.delivery_city || job.city || "Brandon");
            const isCoords = addr ? /^-?\d+(\.\d+)?,\s*-?\d+(\.\d+)?$/.test(addr.trim()) : false;
            const key = isCoords ? addr.replace(/\s+/g, '') : `${name}|${addr}|${city}`.toLowerCase();
            const displayStr = isCoords ? addr.trim() : `${name} ${addr}, ${city}`;
            if(!groupMap.has(key)) {
                const group = { key: key, masterJob: j, jobs: [], addrString: displayStr, isCoords: isCoords };
                groupMap.set(key, group); groups.push(group);
            }
            groupMap.get(key).jobs.push(j);
        } catch (e) {}
    });

    let priorityGroups = [];
    let normalGroups = [];

    groups.forEach(g => {
        const isPriority = g.jobs.some(j => j.manual_priority);
        if (isPriority) priorityGroups.push(g);
        else normalGroups.push(g);
    });

    priorityGroups.sort((a, b) => {
        const aId = Object.keys(globalJobs).find(k => globalJobs[k] === a.jobs[0]);
        const bId = Object.keys(globalJobs).find(k => globalJobs[k] === b.jobs[0]);
        let idxA = manualOrderIds.indexOf(aId);
        let idxB = manualOrderIds.indexOf(bId);
        if(idxA === -1) idxA = 999;
        if(idxB === -1) idxB = 999;
        return idxA - idxB;
    });

    let orderedNormalGroups = normalGroups;
    if (normalGroups.length > 1) {
        let routeOrigin = lastGps ? { location: { latLng: { latitude: lastGps.lat, longitude: lastGps.lng } } } : { address: "1604 Moreland Ave, Brandon MB" };
        if (priorityGroups.length > 0) {
            const lastPrio = priorityGroups[priorityGroups.length - 1];
            routeOrigin = lastPrio.isCoords ? { location: { latLng: { latitude: +lastPrio.addrString.split(',')[0], longitude: +lastPrio.addrString.split(',')[1] } } } : { address: lastPrio.addrString };
        }
        try {
            const optRes = await fetch("//routes.googleapis.com/directions/v2:computeRoutes", {
                method: "POST",
                headers: { "Content-Type": "application/json", "X-Goog-Api-Key": "AIzaSyA6umETP8wBUEV41ugAtiNiChUeLmmwmZI", "X-Goog-FieldMask": "routes.optimizedIntermediateWaypointIndex" },
                body: JSON.stringify({
                    origin: routeOrigin,
                    destination: { address: "1604 Moreland Ave, Brandon MB" },
                    intermediates: normalGroups.map(g => g.isCoords ? { location: { latLng: { latitude: +g.addrString.split(',')[0], longitude: +g.addrString.split(',')[1] } } } : { address: g.addrString }),
                    travelMode: "DRIVE", optimizeWaypointOrder: true
                })
            });
            const optData = await optRes.json();
            if (optData.routes && optData.routes[0] && optData.routes[0].optimizedIntermediateWaypointIndex) {
                orderedNormalGroups = optData.routes[0].optimizedIntermediateWaypointIndex.map(idx => normalGroups[idx]);
            }
        } catch(e) {}
    }

    const finalGroups = priorityGroups.concat(orderedNormalGroups);

    try {
        const response = await fetch("//routes.googleapis.com/directions/v2:computeRoutes", {
            method: "POST",
            headers: { "Content-Type": "application/json", "X-Goog-Api-Key": "AIzaSyA6umETP8wBUEV41ugAtiNiChUeLmmwmZI", "X-Goog-FieldMask": "routes.duration,routes.optimizedIntermediateWaypointIndex,routes.polyline.encodedPolyline,routes.legs" },
            body: JSON.stringify({
                origin: lastGps ? { location: { latLng: { latitude: lastGps.lat, longitude: lastGps.lng } } } : { address: "1604 Moreland Ave, Brandon MB" },
                destination: { address: "1604 Moreland Ave, Brandon MB" }, 
                intermediates: finalGroups.map(g => g.isCoords ? { location: { latLng: { latitude: +g.addrString.split(',')[0], longitude: +g.addrString.split(',')[1] } } } : { address: g.addrString }),
                travelMode: "DRIVE", optimizeWaypointOrder: false
            })
        });
        const result = await response.json();
        
        if (result.routes && result.routes[0]) {
            with(result.routes[0]) {
                if(polyline) {
                    const path = google.maps.geometry.encoding.decodePath(polyline.encodedPolyline);
                    mapPolyline = new google.maps.Polyline({ path: path, geodesic: true, strokeColor: "#0ea5e9", strokeOpacity: 0.8, strokeWeight: 6, map: map });
                }
                const order = optimizedIntermediateWaypointIndex;
                let orderedGroups = finalGroups;
                if(order && order.length > 0) orderedGroups = order.map(idx => finalGroups[idx]);
                
                optimizedOrder = [];
                orderedGroups.forEach(g => g.jobs.forEach(j => { const jId = Object.keys(globalJobs).find(k => globalJobs[k] === j); if(jId) optimizedOrder.push(jId); }));

                if(polyline) {
                     let dur = duration ? +duration : 0;
                     let durStr = dur > 3600 ? `${Math.floor(dur/3600)} hr ${Math.floor((dur%3600)/60)} min` : `${Math.floor(dur/60)} min`;
                     db.ref(`driver_locations/${currentDriver}`).update({ active_route: polyline.encodedPolyline, route_string: orderedGroups.map((g, i) => `${i+1}. ${g.masterJob.status==='pending_pickup' ? (g.masterJob.name + ' ' + g.masterJob.pickup_location) : (g.masterJob.delivery_name + ' ' + g.masterJob.destination)}`).join(" | "), route_order: optimizedOrder, total_duration: durStr, route_timestamp: Date.now() });
                }

                let listHtml = "";

                orderedGroups.forEach((group, i) => {
                    const job = group.masterJob;
                    if(i < legs.length) {
                       const loc = legs[i].endLocation ? legs[i].endLocation.latLng : null;
                       if(loc) {
                            group.jobs.forEach(gj => { 
                                gj.lat = loc.latitude; gj.lng = loc.longitude;
                                const jId = Object.keys(globalJobs).find(k => globalJobs[k] === gj);
                                if(jId) db.ref('jobs').child(jId).update({ lat: loc.latitude, lng: loc.longitude });
                            });
                       }
                       if(!loc) return;
                       
                       const isPickup = job.status === 'pending_pickup', colorHex = isPickup ? "var(--queue-orange)" : "var(--active-green)";
                       const bizName = isPickup ? job.name : job.delivery_name, addrText = isPickup ? job.pickup_location : job.destination;
                       const cityText = isPickup ? (job.pickup_city || job.city || "Brandon") : (job.delivery_city || job.city || "Brandon");
                       
                       mapMarkers.push(new google.maps.Marker({ position: { lat: loc.latitude, lng: loc.longitude }, map: map, label: { text: ''+(i+1), color: "white", fontWeight: "bold" }, icon: { path: google.maps.SymbolPath.CIRCLE, scale: 14, fillColor: isPickup ? "#f97316" : "#10b981", fillOpacity: 1, strokeColor: "white", strokeWeight: 2 }, zIndex: 100 }));
                       const info = new google.maps.InfoWindow({ content: `<div>${bizName}</div>`, disableAutoPan: true, position: { lat: loc.latitude, lng: loc.longitude }, pixelOffset: new google.maps.Size(0, -25) });
                       info.open(map); mapLabels.push(info);

                       const groupIds = group.jobs.map(j => Object.keys(globalJobs).find(k => globalJobs[k] === j));
                       const countBadge = group.jobs.length > 1 ? `<span style="background:var(--accent); color:#fff; font-size:11px; font-weight:600; padding:2px 8px; border-radius:12px; margin-left:8px; vertical-align:middle;">${group.jobs.length} ITEMS</span>` : "";
                       const hasUpdate = groupIds.some(id => pendingAlerts[id] && pendingAlerts[id].length > 0);
                       const isNew = groupIds.some(id => !previouslyKnown.includes(id));
                       const isPriority = group.jobs.some(j => j.manual_priority);
                       const starHtml = isPriority ? `<svg viewBox="0 0 24 24" onclick="togglePriority(event, '${groupIds.join(',')}')" style="position:absolute; right:16px; top:16px; width:28px; height:28px; fill:var(--accent); cursor:pointer; z-index:10;"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>` : '';
                       
                       listHtml += `
                        <div class="mini-list-item ${(hasUpdate || isNew) ? 'mini-flash' : ''}" onclick="showJobGroup('${groupIds.join(',')}')" id="mini-${groupIds.join(',')}" style="position:relative;">
                            ${starHtml}
                            ${hasUpdate ? `<div class="list-update-badge">UPDATED</div>` : ''}
                            <div class="mini-num" style="background:${colorHex};">${i+1}</div>
                            <div style="flex:1; overflow:hidden;">
                                <div style="font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding-right: 24px;">${bizName} ${countBadge}</div>
                                <div style="border:1px solid var(--border-soft); border-radius:8px; padding:8px 12px; margin-top:8px; background:var(--bg-input);">
                                    <div class="mini-address" style="text-align:left; margin:0;">${addrText}</div>
                                    <div style="font-size:13px; font-weight:500; color:var(--text-sec); margin-top:4px;">${cityText}</div>
                                </div>
                            </div>
                        </div>`;
                    }
                });
            }
            document.getElementById('mini-map-list').innerHTML = listHtml;
            document.getElementById('mini-map-list').style.display = 'block';
            if(observer) document.querySelectorAll('.mini-list-item').forEach(item => observer.observe(item));
            isNavigating = true;
            renderUnifiedFeed(); 
            if(Object.keys(globalJobs).length > 0) localStorage.setItem('ec_known_jobs', JSON.stringify(Object.keys(globalJobs)));
        }
    } catch(e) {}
  }

  function setupIntersectionObserver() {
    observer = new IntersectionObserver(entries => {
      entries.forEach(entry => { 
        if (entry.isIntersecting) { 
            const el = entry.target;
            if(el.classList.contains('mini-flash') || el.classList.contains('has-update') || el.classList.contains('new-job-highlight')) {
                setTimeout(() => {
                    let ids = [];
                    if(el.id.startsWith('mini-')) {
                        el.classList.remove('mini-flash');
                        const badge = el.querySelector('.list-update-badge');
                        if(badge) badge.remove();
                        ids = el.id.replace('mini-', '').split(',');
                    } else if(el.id.startsWith('card-')) {
                        el.classList.remove('has-update', 'new-job-highlight');
                        ids = [el.id.replace('card-', '')];
                    }
                    ids.forEach(gid => {
                        sessionStorage.setItem(`ack_update_${gid}`, 'true');
                        delete pendingAlerts[gid];
                        if(!previouslyKnown.includes(gid)) previouslyKnown.push(gid);
                        const job = globalJobs[gid];
                        if(job && (!job.seen_by || !job.seen_by[currentDriver])) {
                            db.ref(`jobs/${gid}/seen_by/${currentDriver}`).set(true);
                        }
                        const card = document.getElementById(`card-${gid}`);
                        if(card) {
                            card.classList.remove('has-update', 'new-job-highlight');
                            const bdg = document.getElementById(`badge-${gid}`);
                            if(bdg) bdg.style.display = 'none';
                        }
                        const mini = document.querySelector(`[id^="mini-"][id*="${gid}"]`);
                        if(mini) {
                            mini.classList.remove('mini-flash');
                            const mBdg = mini.querySelector('.list-update-badge');
                            if(mBdg) mBdg.remove();
                        }
                    });
                    localStorage.setItem('ec_known_jobs', JSON.stringify(previouslyKnown));
                    updateNewStopsCountUI();
                }, 3000);
                observer.unobserve(el);
            }
        } 
      });
    }, { threshold: 0.5 });
  }

  function dndJob(id) {
    const job = globalJobs[id]; if(!job) return;
    const refPath = 'jobs';

    if (reason === null) return; 
    if (!reason.trim()) { alert("Please provide a reason."); return; }
    const tag = job.status === 'pending_pickup' ? "DNP" : "DND";
    const newEntry = `${tag} (${currentDriver}): ${reason}`;
    
    document.getElementById(`card-${id}`)?.classList.add('card-exit-success');
    closeJobCard();
    setTimeout(() => {
      db.ref(refPath).child(id).update({ status: tag, completed_at: Date.now(), job_history: job.job_history ? `${job.job_history} | ${newEntry}` : newEntry, last_edit_by: currentDriver, assigned_to: 'Unassigned' }).catch(err => alert("Error: " + err.message));
    }, 500);

    const targetEmail = job.status === 'pending_pickup' ? (job.p_email || job.customer_email) : (job.d_email || job.customer_email);
    if (targetEmail) fetch("//script.google.com/macros/s/AKfycbyQDC4eq3YiiDLuY42Y7rBpWa1FBkPTaCUMQJTSw8qAEzW5sfBA4hR4WNNwzdxMFLij/exec", { method: "POST", mode: "no-cors", body: JSON.stringify({ email: targetEmail, notes: newEntry, type: job.status }) });

      if(isCoords) return `//googleusercontent.com/maps.google.com/2{encodeURIComponent(loc.trim())}&travelmode=driving`; 
      return `//googleusercontent.com/maps.google.com/2{encodeURIComponent((name ? name + ' ' : '') + loc + ', ' + city)}&travelmode=driving`; 
  }

  function closeJobCard() {
      document.querySelectorAll('.active-card').forEach(card => {
        if(card.style.display !== 'none') {
             const id = card.id.replace('card-', '');
             if(card.classList.contains('new-job-highlight')) {
                 const job = globalJobs[id]; if(job) markAsSeenPersistent(id, 'jobs');
             }
             if(pendingAlerts[id] || sessionStorage.getItem(`ack_update_${id}`) !== 'true') {
                  sessionStorage.setItem(`ack_update_${id}`, 'true'); delete pendingAlerts[id]; card.classList.remove('has-update'); document.getElementById(`badge-${id}`)?.style.setProperty('display', 'none');
             }
             if(!previouslyKnown.includes(id)) previouslyKnown.push(id);
             document.querySelectorAll('.mini-list-item').forEach(item => { if(item.onclick && item.getAttribute('onclick').includes(id)) { item.classList.remove('mini-flash'); item.querySelector('.list-update-badge')?.remove(); } });
        }

      document.getElementById('live-feed').classList.remove('overlay-active');
  }

  function startDataListeners() {
    db.ref(`driver_locations/${currentDriver}/manual_order`).on('value', snap => { if(snap.exists()) manualOrderIds = snap.val() || []; });
    db.ref("jobs").orderByChild("assigned_to").equalTo(currentDriver).on("value", snap => { jobsData = snap.val() || {}; mergeAndRender(); });
  }
  let jobsData = {};

  function mergeAndRender() {
    if(!currentDriver) return;
    globalJobs = jobsData;
    
    const currentPending = Object.values(globalJobs).filter(j => (j.status === 'pending_pickup' || j.status === 'pending_delivery') && j.assigned_to === currentDriver).length;
    if (currentPending !== lastPendingCount) {
         if (currentPending > lastPendingCount) {
              lastAnnouncedId = null;
         }
         if (!isFirstLoad) document.getElementById('route-toggle-btn').classList.add('route-glow-update');
    }
    isFirstLoad = false; lastPendingCount = currentPending;
    
    const shiftBtn = document.getElementById('shift-toggle-btn');
    if (shiftBtn) {
        shiftBtn.style.display = (!window.isShiftActive && currentPending > 0) ? 'inline-block' : 'none';
        shiftBtn.innerText = 'START RUN';
        shiftBtn.style.background = 'var(--active-green)';
    }

    renderUnifiedFeed(); updateRoute();
  }

  function renderUnifiedFeed() {
    const feed = document.getElementById("live-feed"), rLog = document.getElementById("recent-log"), qLog = document.getElementById("queue-log"), routeBtn = document.getElementById("multi-route-btn"), stopCounter = document.getElementById("stop-counter");

    rLog.innerHTML = ""; qLog.innerHTML = "";
    const startOfToday = new Date().setHours(0,0,0,0), lastDoneId = sessionStorage.getItem('last_completed_job'), uniqueStops = new Set();
    let pendingCount = 0, seqIndex = 0;

    const sortedEntries = manualOrderIds.length > 0 
      ? [...manualOrderIds.map(id => [id, globalJobs[id]]).filter(e => e[1]), ...Object.entries(globalJobs).filter(([id]) => !manualOrderIds.includes(id)).sort((a, b) => (a[1].timestamp || 0) - (b[1].timestamp || 0))]
      : (optimizedOrder.length > 0 
        ? [...optimizedOrder.map(id => [id, globalJobs[id]]).filter(e => e[1]), ...Object.entries(globalJobs).filter(([id]) => !optimizedOrder.includes(id)).sort((a, b) => (a[1].timestamp || 0) - (b[1].timestamp || 0))]
        : Object.entries(globalJobs).sort((a, b) => (a[1].timestamp || 0) - (b[1].timestamp || 0)));

    sortedEntries.forEach(([id, p]) => {
      if (p.assigned_to !== currentDriver) return;
      if ((p.status === 'completed' || p.status === 'DND' || p.status === 'DNP') && (p.completed_at || 0) < startOfToday) return;

      const cf = { addr: p.pickup_location, dest: p.destination, contact: p.name, dropName: p.delivery_name, po: p.po_number, notes: p.other_info, details: p.package_details, status: p.status, assigned: p.assigned_to, job_history: p.job_history };
      if (fieldSnapshots[id]) {
          Object.keys(cf).forEach(k => {
              if (k !== 'job_history' && fieldSnapshots[id][k] !== cf[k]) {
                  if (selfEdited.has(`${id}_${k}`)) selfEdited.delete(`${id}_${k}`);
                  else { if (!pendingAlerts[id]) pendingAlerts[id] = []; if (!pendingAlerts[id].includes(k)) pendingAlerts[id].push(k); sessionStorage.removeItem(`ack_update_${id}`); }
              }
          });
      }
      fieldSnapshots[id] = { ...cf };
      const changed = pendingAlerts[id] || [], needsAlert = changed.length > 0 && !sessionStorage.getItem(`ack_update_${id}`);
      
      let displayCity = p.status === 'pending_pickup' ? (p.pickup_city || p.city || "Brandon") : (p.delivery_city || p.city || "Brandon");
      const statusMap = { 'pending_pickup': { badgeColor: "var(--queue-orange)", badgeText: "PICK UP", btnText: "PICKED UP", topOpacity: 1, botOpacity: 0.5 }, 'in_transit': { badgeColor: "var(--review-blue)", badgeText: "ON TRUCK", btnText: "UNLOAD AT DEPOT", topOpacity: 0.5, botOpacity: 1 } };
      let { badgeColor, badgeText, btnText, topOpacity, botOpacity } = statusMap[p.status] || { badgeColor: "var(--active-green)", badgeText: "DELIVERY", btnText: "DONE", topOpacity: 0.5, botOpacity: 1 };
      
      const item = document.createElement("div"); 
      item.className = "history-item"; item.id = `mini-${id}`;
      if(id === lastDoneId) { item.classList.add('just-archived'); sessionStorage.removeItem('last_completed_job'); }
      if(needsAlert) item.classList.add('has-update');

      item.innerHTML = `<div style="background:${badgeColor}; width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:8px;"></div><span class="history-contact" style="font-size:13px; font-weight:600; margin-bottom:2px; display:inline;">${p.name || 'No Name'}</span><div style="font-weight:500; font-size:12px; line-height:1.3; color:var(--text-sec); margin-top:4px;">${p.pickup_location || 'No Address'}</div><span class="history-package" style="display:block; margin-top:4px; font-size:12px;">${(p.package_details || '').replace(/\b(skid|pallet)\b/gi, '<span class="heavy-word">$&</span>')}</span>`;

      if (p.status === 'completed' || p.status === 'DND' || p.status === 'DNP') {
        item.classList.add('done-slash'); item.onclick = () => restoreToQueue(id); rLog.appendChild(item);
      } else {
        if (p.status !== 'in_transit') pendingCount++;
        seqIndex++; uniqueStops.add((p.status === 'pending_pickup' ? (p.pickup_location||"") : (p.destination||"")).trim()); item.onclick = () => scrollToCard(id); qLog.appendChild(item);

        if (p.status !== 'in_transit') {
          const card = document.createElement("div"); card.className = "active-card"; card.style.display = 'none'; card.id = `card-${id}`;
          if (!p.seen_by || !p.seen_by[currentDriver]) card.classList.add('new-job-highlight');
          if(needsAlert) card.classList.add('has-update');

          const escapedNotes = (p.other_info || "").replace(/\\/g, "\\\\").replace(/'/g, "\\'");
          const isEdited = (p.other_info || "").match(/(Edited by|DND \(|DNP \(|Driver Note \()/);
          const noteWithTags = (p.other_info || "").replace(/\[([^\]]+)\]:/g, '<span style="color:var(--update-blue); font-weight:700;">[$1]:</span>');
          const phone = p.status === 'pending_pickup' ? (p.p_phone || p.phone || p.phone_number || p.customer_phone) : (p.d_phone || p.phone || p.phone_number || p.customer_phone);

          card.innerHTML = `
            <div class=flex-row>
              <div class=col-main> 
                 <div class=card-top>
                    <div class=card-date-badge onclick=closeJobCard()>
                       <div class=seq-badge>${seqIndex}</div>
                       <div class=type-badge style="background:${badgeColor};">${badgeText}</div>
                       ${needsAlert ? `<span id=badge-${id} class=update-badge>UPDATED</span>` : ''}

                    <a href="${getNavUrl(p.status==='pending_pickup'?p.name:p.delivery_name, p.status==='pending_pickup'?p.pickup_location:p.destination, displayCity)}" target=_blank class=nav-link><div class=city-tag style="margin:0;">${displayCity}</div></a>
                 </div>
                 <div style="opacity:${topOpacity}">
                     <div class=card-label>FROM</div>
                     <div class="tech-info ${needsAlert && changed.includes('contact') ? 'field-highlight' : ''}" style="margin-bottom:4px; font-size:18px; line-height:1.2;">${p.name || 'N/A'}</div>
                     <a href="${getNavUrl(p.name, p.pickup_location, p.pickup_city || p.city || 'Brandon')}" target=_blank class=nav-link><div class="pickup-value ${needsAlert && changed.includes('addr') ? 'field-highlight' : ''}">${p.pickup_location}</div></a>
                 </div>
                 <div class=pkg-wrapper><div class="tech-info ${needsAlert && changed.includes('details') ? 'field-highlight' : ''}" style="font-size:14px; color:var(--text-sec); text-transform:uppercase;">${(p.package_details || "-").replace(/\b(skid|pallet)\b/gi, '<span class="heavy-word">$&</span>')}</div></div>
                 <div style="opacity:${botOpacity}">
                     <div class=card-label style="margin-top:8px;">TO</div>
                     <div class="tech-info ${needsAlert && changed.includes('dropName') ? 'field-highlight' : ''}" style="color: var(--text-sec); font-size:15px; margin-bottom:4px;">${p.delivery_name || 'N/A'}</div>
                     <a href="${getNavUrl(p.delivery_name, p.destination, p.delivery_city || p.city || 'Brandon')}" target=_blank class=nav-link><div class="drop-value ${needsAlert && changed.includes('dest') ? 'field-highlight' : ''}" style="font-size:15px; color:var(--text-sec);">${p.destination}</div></a>
                 </div>
                 ${(p.po_number && p.po_number.trim() !== "") ? `<div id=po-container-${id} onclick="enterPoEdit(event, '${id}', '${(p.po_number||"").replace(/'/g, "\\'")}')" class=po-wrapper>PO: <span class="${needsAlert && changed.includes('po') ? 'field-highlight' : ''}" style="color:var(--text-main); font-weight:600;">${p.po_number}</span></div>` : ''}
                 ${(p.other_info && p.other_info.trim() !== "") ? `<div class="note-box ${isEdited ? 'notes-edited' : ''} ${needsAlert && changed.includes('notes') ? 'field-highlight' : ''}">${noteWithTags}</div>` : ''}
                 ${phone ? `<a href="tel:${phone}" class=phone-link onclick=event.stopPropagation()>📞 ${phone}</a>` : ''}
                 ${(p.job_history && p.job_history.trim() !== "") ? `<div style="font-size:11px; color:var(--text-sec); margin-top:16px; text-align:center; font-style:italic;">${p.job_history}</div>` : ''}
              </div>
              <div class=col-side>

                    </div>
                    <div class=icon-wrap onclick="toggleDriverNoteEdit(event, '${id}')">
                       <svg viewBox="0 0 24 24" style="width: 24px; height: 24px;"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                    </div>
                 </div>
                 <div class=time-stack><div class=job-time-stamp>${formatTime12(p.timestamp)}</div><div class=job-date-stamp>${formatDateShort(p.timestamp)}</div></div>
                 <button class=info-btn onclick="dndJob('${id}')">${p.status==='pending_pickup'?'DNP':'DND'}</button>
                 ${p.status === 'in_transit' ? '' : `<button class=done-btn onclick="markAction('${id}')">${btnText}</button>`}

          feed.appendChild(card); if (observer) observer.observe(card);

    });

    updateNewStopsCountUI();
    const stopsCredit = Object.values(globalJobs).filter(j => (j.status === 'completed' || j.status === 'in_transit') && j.assigned_to === currentDriver).length;
    if (stopCounter) stopCounter.innerText = `${stopsCredit} STOPS`;
    
    if(pendingCount >= 20) { routeBtn.innerText = "MAX ROUTE"; } 
    else if(pendingCount > 1) { routeBtn.innerText = "ROUTE NAV"; } 
    else { routeBtn.innerText = "ROUTE NAV"; }

    if (feed.classList.contains('overlay-active') && feed.querySelectorAll('.active-card').length === 0) closeJobCard();

    const miniList = document.getElementById('mini-map-list');
    if (pendingCount === 0) {
        const completed = Object.values(globalJobs).filter(j => j.assigned_to === currentDriver && (j.completed_at >= startOfToday || j.timestamp >= startOfToday)).sort((a,b) => (b.completed_at || b.timestamp) - (a.completed_at || a.timestamp));
        let html = `<div class=perf-header><div class=score-title style="color:var(--text-sec); font-weight:600; font-size:14px; letter-spacing:1px; text-transform:uppercase;">RUN PERFORMANCE</div><div class=perf-stat>${completed.length}</div><div class=score-sub style="color:var(--text-sec); font-size:12px; font-weight:500;">STOPS COMPLETED</div></div><div style="padding:24px;">`;
        const transitCount = Object.values(globalJobs).filter(j => j.status === 'in_transit' && j.assigned_to === currentDriver).length;

        miniList.innerHTML = html + `</div><div style="height:80px;"></div>`; miniList.style.display = 'block';
    }

    const miniListContainer = document.getElementById('mini-map-list');
    if (window.sortableFeed) window.sortableFeed.destroy();
    window.sortableFeed = new Sortable(miniListContainer, {
        animation: 150, delay: 400, delayOnTouchOnly: true, draggable: '.mini-list-item',

            if(evt.item && evt.item.id) {
                const items = miniListContainer.querySelectorAll('.mini-list-item');
                let newManualOrder = [];
                items.forEach(item => {
                    const groupIds = item.id.replace('mini-', '').split(',');

                const draggedIds = evt.item.id.replace('mini-', '').split(',');
                let updates = {};
                draggedIds.forEach(id => { 
                    if (globalJobs[id]) {
                        globalJobs[id].manual_priority = true; 
                        updates[`${id}/manual_priority`] = true;
                    }
                });
                if(Object.keys(updates).length > 0) {
                    db.ref('jobs').update(updates);
                }
            }
        }
    });
  }

  function markAction(id) {
    if (!window.isShiftActive) { alert("Please click START RUN before completing your first job."); return; }
    const job = globalJobs[id]; if(!job) return;
    if (job.status === 'pending_pickup') {
         if(!confirm("Confirm Picked Up?")) return;
         document.getElementById(`card-${id}`)?.classList.add('card-exit-success');
         closeJobCard();
         setTimeout(() => db.ref('jobs').child(id).update({ status: 'in_transit' }), 500);
    } else if (job.status === 'pending_delivery') {
         if(!confirm("Complete Delivery?")) return;
         document.getElementById(`card-${id}`)?.classList.add('card-exit-success');
         closeJobCard();
         setTimeout(() => {
            sessionStorage.setItem('last_completed_job', id);
            db.ref('jobs').child(id).update({ status: 'completed', completed_at: Date.now(), job_history: (job.job_history || '') + " | Delivered by " + currentDriver });
         }, 500);
    }
  }

  function logoutDriver() { if(confirm("Are you sure you want to log out?")) { firebase.auth().signOut().then(() => { localStorage.removeItem('ec_driver_name'); location.reload(); }); } }

  document.addEventListener('click', e => { 
      if(e.target.id && e.target.id.startsWith('note-display-')) { 
          e.stopPropagation(); const id = e.target.id.split('-').pop(), job = globalJobs[id];
          if(job) db.ref('jobs').child(id).child("other_info").once('value', s => enterNoteEdit(id, (s.val() || "").replace(/\\/g, "\\\\").replace(/'/g, "\\'"))); 
      } 
  });

  let deferredPrompt; const installBtn = document.getElementById('install-btn');
  window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; installBtn.style.display = 'block'; });
  async function installPWA() {
    if (deferredPrompt) { deferredPrompt.prompt(); const { outcome } = await deferredPrompt.userChoice; if (outcome === 'accepted') installBtn.style.display = 'none'; deferredPrompt = null; }
  }
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(e=>{}));
    navigator.serviceWorker.addEventListener('message', event => { if (event.data && event.data.jobId) showJobGroup(event.data.jobId); });
  }
  
  let touchStart = 0;
  const feedUi = document.getElementById('live-feed');
  feedUi.addEventListener('touchstart', e => touchStart = e.changedTouches[0].screenX, {passive: true});
  feedUi.addEventListener('touchend', e => { if(e.changedTouches[0].screenX > touchStart + 75) closeJobCard(); }, {passive: true});

  function unloadAtDepot() {
      if(!confirm("Are you sure you want to End Shift and Check-In at Depot?")) return;
      window.isShiftActive = false;
      const updates = {}; let count = 0;
      Object.keys(globalJobs).forEach(key => {
          const job = globalJobs[key];
          if (job.status === 'in_transit' && job.assigned_to === currentDriver) {
              count++;
              updates[`jobs/${key}/status`] = 'pending_delivery';
              updates[`jobs/${key}/assigned_to`] = 'Unassigned';
              updates[`jobs/${key}/job_history`] = (job.job_history || '') + ` | Arrived at Depot (Pick-Up by ${currentDriver})`;
          }
      });
      updates[`driver_locations/${currentDriver}/shift_active`] = false;
      db.ref().update(updates).then(() => { alert(count > 0 ? "Inventory Unloaded and Shift Ended." : "Shift Ended."); mergeAndRender(); }).catch(e => alert("Error unloading: " + e.message));
  }

  function toggleShift() {
    if(!currentDriver) return;
    const newState = !window.isShiftActive;
    db.ref(`driver_locations/${currentDriver}`).update({ shift_active: newState });
    updateRoute();
  }
</script>

<script>
  let devQuill;

  // Initialize the editor immediately
  devQuill = new Quill('#dev-editor', {
    theme: 'snow',
    modules: { 
      toolbar: [ 
        ['bold', 'italic', 'underline'], 
        [{ 'list': 'ordered'}, { 'list': 'bullet' }], 
        [{ 'align': [] }] 
      ] 
    }
  });

  function saveDevNote() {
    // Only save if there is text and a user is logged in
    const currentUser = firebase.auth().currentUser;
    if (devQuill.getText().trim() === "" || !currentUser) return;
    
    // Get username from email
    const user = currentUser.email.split('@')[0];
    
    // Format date and time
    const now = new Date();
    const dateStr = now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

    // Push data to Firebase
    firebase.database().ref('developer').push({
      text: devQuill.root.innerHTML,
      user: user,
      date: dateStr,
      timestamp: firebase.database.ServerValue.TIMESTAMP,
      app: "Driver APP"
    }).then(() => {
      devQuill.setText(''); // Clear editor on success
    }).catch(err => {
      alert("Permission denied: You must be logged in to save.");
    });
  }
</script>
