  window.v=function(){let c=firebase.auth().currentUser;if(dq.getText().trim()===""||!c)return;let u=c.email.split('@')[0],n=new Date(),d=n.toLocaleDateString()+' '+n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});firebase.database().ref('developer').push({text:dq.root.innerHTML,user:u,date:d,timestamp:firebase.database.ServerValue.TIMESTAMP,app:"Driver APP"}).then(()=>dq.setText('')).catch(e=>{console.error("Save failed:",e);alert("Permission denied: You must be logged in to save.");});};
</script>
</body>
</html>
