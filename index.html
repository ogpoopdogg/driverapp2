    [data-theme="light"] {

    @keyframes proUpdatePulse { 0% { box-shadow: 0 0 5px rgba(255, 152, 0, 0.2); border-color: #777; } 50% { box-shadow: 0 0 20px rgba(255, 152, 0, 0.6); border-color: #ff9800; } 100% { box-shadow: 0 0 5px rgba(255, 152, 0, 0.2); border-color: #777; } }

    @keyframes update-glow { from { box-shadow: 0 0 5px var(--update-blue); } to { box-shadow: 0 0 15px var(--update-blue); } }
